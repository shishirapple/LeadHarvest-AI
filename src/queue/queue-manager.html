<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadHarvest AI - Queue Manager</title>
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --danger-color: #ef4444;
      --info-color: #3b82f6;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: var(--gray-800);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px;
    }

    .header p {
      color: var(--gray-500);
      font-size: 14px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary-color);
    }

    .stat-label {
      font-size: 13px;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* Main Content */
    .main-content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .main-content {
        grid-template-columns: 350px 1fr;
      }
    }

    /* Add Task Panel */
    .panel {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-lg);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gray-100);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-success {
      background: var(--success-color);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-warning {
      background: var(--warning-color);
      color: white;
    }

    .btn-warning:hover {
      background: #d97706;
    }

    .btn-danger {
      background: var(--danger-color);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-block {
      width: 100%;
    }

    /* Queue Controls */
    .queue-controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    /* Task List */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.2s;
    }

    .task-item:hover {
      box-shadow: var(--shadow-md);
    }

    .task-item.running {
      border-color: var(--primary-color);
      background: rgba(37, 99, 235, 0.05);
    }

    .task-item.completed {
      border-color: var(--success-color);
      background: rgba(16, 185, 129, 0.05);
    }

    .task-item.failed,
    .task-item.cancelled {
      border-color: var(--danger-color);
      background: rgba(239, 68, 68, 0.05);
    }

    .task-item.paused {
      border-color: var(--warning-color);
      background: rgba(245, 158, 11, 0.05);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .task-info {
      flex: 1;
    }

    .task-query {
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 4px;
    }

    .task-meta {
      font-size: 12px;
      color: var(--gray-500);
    }

    .task-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pending {
      background: var(--gray-200);
      color: var(--gray-600);
    }

    .status-running {
      background: var(--primary-color);
      color: white;
    }

    .status-completed {
      background: var(--success-color);
      color: white;
    }

    .status-failed,
    .status-cancelled {
      background: var(--danger-color);
      color: white;
    }

    .status-paused {
      background: var(--warning-color);
      color: white;
    }

    .progress-container {
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 8px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-color), var(--success-color));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: var(--gray-600);
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-500);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state-text {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty-state-subtext {
      font-size: 13px;
    }

    /* Export Section */
    .export-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--gray-100);
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toast {
      background: var(--gray-800);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      margin-top: 8px;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
    }

    .toast.success {
      background: var(--success-color);
    }

    .toast.error {
      background: var(--danger-color);
    }

    .toast.warning {
      background: var(--warning-color);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🎯 LeadHarvest AI</h1>
      <p>Advanced Lead Generation Queue Manager</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-running">0</div>
        <div class="stat-label">Running</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-leads">0</div>
        <div class="stat-label">Total Leads</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Add Task Panel -->
      <div class="panel">
        <h2 class="panel-title">➕ Add New Task</h2>
        
        <form id="addTaskForm">
          <div class="form-group">
            <label for="taskQuery">Search Query</label>
            <input type="text" id="taskQuery" placeholder="e.g., Restaurants in Dubai" required>
          </div>
          
          <div class="form-group">
            <label for="taskSource">Source</label>
            <select id="taskSource">
              <option value="maps">Google Maps</option>
              <option value="linkedin" disabled>LinkedIn (Coming Soon)</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="taskTarget">Target Leads</label>
            <input type="number" id="taskTarget" value="100" min="1" max="10000" required>
          </div>
          
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">
            Add to Queue
          </button>
        </form>

        <!-- Queue Controls -->
        <div class="export-section">
          <h2 class="panel-title">⚙️ Queue Controls</h2>
          <div class="queue-controls">
            <button id="btnStartQueue" class="btn btn-success">▶ Start</button>
            <button id="btnPauseQueue" class="btn btn-warning" disabled>⏸ Pause</button>
            <button id="btnResumeQueue" class="btn btn-primary" disabled>▶ Resume</button>
            <button id="btnStopQueue" class="btn btn-danger" disabled>⏹ Stop</button>
          </div>
          <div class="queue-controls">
            <button id="btnClearCompleted" class="btn btn-secondary">🗑 Clear Completed</button>
            <button id="btnClearAll" class="btn btn-danger">🗑 Clear All</button>
          </div>
          <button id="btnExport" class="btn btn-primary btn-block" style="margin-top: 12px;">
            📥 Export Leads
          </button>
        </div>
      </div>

      <!-- Task List Panel -->
      <div class="panel">
        <h2 class="panel-title">📋 Queue Tasks</h2>
        <div id="taskList" class="task-list">
          <!-- Tasks will be rendered here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="queue-manager.js"></script>
</body>
</html>
